<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Планировщик</title>
  <link rel="stylesheet" href="/base.css">
  <link rel="stylesheet" href="destination.css">
</head>
<body>
<div class="app">
  <header class="top">
    <h1 class="logo">Планеровщик</h1>
    <div class="top-actions">
      <a class="icon-btn light-btn" href="/index.html"><img src="/log-out-outlined-svgrepo-com.svg" alt="main"></a>
      <a class="icon-btn accent-btn" href="/pages/lists/taskList/taskList.html"><hr><hr><hr></a>
      <a class="icon-btn just-btn" href="/pages/lists/shopList/shopList.html">🧺</a>
      <button class="icon-btn just-btn">⚙️</button>
    </div>
  </header>
  <main class="dashboard">
    <div class="content-title">
        <img id="main-img" src="/istockphoto-1526986072-612x612.jpg" alt="">
        <h2>НАЗВАНИЕ</h2>
    </div>
    <nav id="navigation" class="navigation">
        <button class="active" data-nav="daysPlan">Планы</button>
        <button data-nav="reserv">Брони</button>
        <button data-nav="budjet">Бюджет</button>
        <button data-nav="checkList">Чек-листы</button>
    </nav>
    <section class="content">
        <div id="daysPlan" class="daysPlan">
            <nav id="days-navigation" class="daysPlan_nav">
                <button class="daysPlan_btn active-day" data-nav="1"><h3>День 1</h3><span>01/01/26</span></button>
                <button class="daysPlan_btn" data-nav="2"><h3>День 2</h3><span>02/01/26</span></button>                
                <button id="add-day-plan" class="daysPlan_add-day">+</button>
            </nav>
            <div class="daysPlan_content" data-dayContent="1">
                <ul>
                    <li id="6">
                        <span class="daysPlan_day-time">04:00</span>
                        <h4 class="daysPlan_day-item">Yfpdfybt tyhbt</h4>
                    </li>
                    <li id="7">
                        <span class="daysPlan_day-time">04:00</span>
                        <h4 class="daysPlan_day-item">Yfpdfybt tyhbt</h4>
                    </li>
                </ul>
            </div>
            <div class="daysPlan_content hidden" data-dayContent="2">
                <ul>
                    <li id="16">
                        <span class="daysPlan_day-time">09:00</span>
                        <h4 class="daysPlan_day-item">YTTTTTTTThbt</h4>
                    </li>
                </ul>
            </div>
            <button id="add-day-plan-item" class="daysPlan_add-content">+</button>
            <div class="daysPlan_item-detaile hidden">
                <ul>
                    <li>papa</li>
                </ul>
            </div>
        </div>
        <div id="reserv" class="reserv hidden">rvrgvrf</div>
        <div id="budjet" class="budjet hidden"></div>
        <div id="checkList" class="checkList hidden"></div>
        <div id="marks" class="marks hidden"></div>
    </section>
    <section>
        <button class="marks-btn" data-nav="marks">Заметки</button>
    </section>
    <div class="modal-wrap hidden">
        <form class="modal-content">
            <h3 id="new-day-count" data-newDay="0">День</h3>
            <input type="date">
            <button id="create-new-day" class="primary-btn">OK</button>
        </form>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/DBconnect.js"></script>
<script src="destination.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Планировщик</title>
  <link rel="stylesheet" href="/base.css">
  <link rel="stylesheet" href="destination.css">
</head>
<body>
<div class="app">
  <header class="top">
    <h1 class="logo">Планеровщик</h1>
    <div class="top-actions">
      <a class="icon-btn light-btn" href="/index.html"><img src="/log-out-outlined-svgrepo-com.svg" alt="main"></a>
      <a class="icon-btn accent-btn" href="/pages/lists/taskList/taskList.html"><hr><hr><hr></a>
      <a class="icon-btn just-btn" href="/pages/lists/shopList/shopList.html">🧺</a>
      <button class="icon-btn just-btn">⚙️</button>
    </div>
  </header>
  <main class="dashboard">
    <div class="content-title">
        <img id="main-img" src="/istockphoto-1526986072-612x612.jpg" alt="">
        <h2></h2>
    </div>
    <nav id="navigation" class="navigation">
        <button class="active" data-nav="daysPlan">Планы</button>
        <button data-nav="reserv">Брони</button>
        <button data-nav="budjet">Бюджет</button>
        <button data-nav="checkList">Чек-листы</button>
    </nav>
    <section class="content">
        <div id="daysPlan" class="daysPlan">
            <nav id="days-navigation" class="daysPlan_nav">
                <button id="add-day-plan" class="daysPlan_add-day">+</button>
            </nav>
            <button id="add-day-plan-item" class="daysPlan_add-content">+</button>
            <div class="daysPlan_item-detaile hidden">
                <ul>
                    <li>papa</li>
                </ul>
            </div>
        </div>
        <div class="reserv hidden">
            <ul id="reserv"></ul>
            <button id="add-reserv" class="daysPlan_add-content">+</button>
        </div>
        <div id="budjet" class="budjet hidden"></div>
        <div id="checkList" class="checkList hidden">
            <ul class="checkList_tab">
                <li class="active-list" data-nav="buying">
                    <div>
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M15 21H5C3.89543 21 3 20.1046 3 19V8C3 7.44772 3.44772 7 4 7H14C14.5523 7 15 7.44772 15 8V10.5" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> <path d="M9 12C9 11.4477 9.44772 11 10 11H20C20.5523 11 21 11.4477 21 12V19C21 20.1046 20.1046 21 19 21H11C9.89543 21 9 20.1046 9 19V12Z" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> <path d="M12 7V6C12 4.34315 10.6569 3 9 3V3C7.34315 3 6 4.34315 6 6V7" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> <path d="M13 14L13 15C13 16.1046 13.8954 17 15 17V17C16.1046 17 17 16.1046 17 15L17 14" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
                    </div>
                </li>
                <li data-nav="packing">
                    <div>
                        <svg fill="#000000" height="200px" width="200px" version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 100 100" enable-background="new 0 0 100 100" xml:space="preserve"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M61.6,89.1c5.5,0,10-4.5,10-10v-50c0-5.5-4.5-10-10-10h-34c-5.5,0-10,4.5-10,10v50c0,5.5,4.5,10,10,10H61.6z M23.2,31.6 c0-3.7,3-6.7,6.7-6.7h29.3c3.7,0,6.7,3,6.7,6.7v1.6c0,0.6-0.4,1-1,1s-1-0.4-1-1v-1.6c0-2.6-2.1-4.7-4.7-4.7H29.9 c-2.6,0-4.7,2.1-4.7,4.7v1.6c0,0.6-0.4,1-1,1s-1-0.4-1-1V31.6z M25.2,61.4V63c0,0.6-0.4,1-1,1s-1-0.4-1-1v-1.6c0-3.7,3-6.7,6.7-6.7 h29.3c3.7,0,6.7,3,6.7,6.7V63c0,0.6-0.4,1-1,1s-1-0.4-1-1v-1.6c0-2.6-2.1-4.7-4.7-4.7H29.9C27.3,56.7,25.2,58.8,25.2,61.4z M43.2,7.8c0-1.4,1.1-2.5,2.5-2.5h5.7c1.4,0,2.5,1.1,2.5,2.5v7.4h4V7.8c0-3.6-2.9-6.5-6.5-6.5h-5.7c-3.6,0-6.5,2.9-6.5,6.5v7.4h4 V7.8z M72.4,19.1h-1.2c2.7,2.6,4.4,6.2,4.4,10.2V79c0,4-1.7,7.6-4.4,10.2h1.2c5.5,0,10-4.5,10-10v-50C82.4,23.6,77.9,19.1,72.4,19.1 z M63.1,98.6c3.1,0,5.7-2.5,5.7-5.7H57.4C57.4,96.1,59.9,98.6,63.1,98.6z M33.1,98.6c3.1,0,5.7-2.5,5.7-5.7H27.4 C27.4,96.1,30,98.6,33.1,98.6z"></path> </g></svg>
                    </div>
                </li>
                <li data-nav="deal">
                    <div>
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"><path d="M14.5 16.5H16.1152C16.9825 16.5 17.7946 16.0745 18.2883 15.3614L21.6315 10.5323C21.8588 10.204 21.889 9.77803 21.7105 9.42094C21.3678 8.73545 20.4444 8.60613 19.9265 9.17109L17.2727 12.0661C16.2059 13.23 14.5301 13.612 13.0643 13.0257L9.44043 11.5762C8.53873 11.2155 7.51727 11.3218 6.70922 11.8605L2.87237 14.4184C2.37401 14.7507 2.20104 15.402 2.4689 15.9377C2.76223 16.5244 3.47562 16.7622 4.06229 16.4689L7.24772 14.8762C7.86821 14.5659 8.54577 15.1811 8.29674 15.8286L6.50003 20.5M7.00003 4H4.00003M6.00003 7H4.00003M18 6.5C18 8.70914 16.2092 10.5 14 10.5C11.7909 10.5 10 8.70914 10 6.5C10 4.29086 11.7909 2.5 14 2.5C16.2092 2.5 18 4.29086 18 6.5Z" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.4"></path></g></svg>
                    </div>
                </li>
            </ul>
            <section class="blue buying">
                <ul id="buying">
                </ul>
            </section>
            <section class="green packing hidden">
                <ul id="packing"></ul>
            </section>
            <section class="yellow deal hidden">
                <ul id="deal"></ul>
            </section>
            <button id="add-check-item" class="daysPlan_add-content">+</button>
        </div>
        <div class="marks hidden">
            <ul id="marks"></ul>
            <button id="add-mark" class="daysPlan_add-content">+</button>
        </div>
    </section>
    <section>
        <button class="marks-btn" data-nav="marks">Заметки</button>
    </section>
    <div class="modal-wrap hidden" data-modalType="0">
        <form class="modal-content">
            <h3 id="new-day-count" data-newDay></h3>
            <input type="date">
            <input type="time">
            <input type="text" placeholder="Название">
            <textarea placeholder="Детали"></textarea>
            <div>
                <input type="number" placeholder="Цена">
                <select name="currency">
                    <option value="$">$</option>
                    <option value="тг" selected>тг</option>
                </select>
                <input type="checkbox">
            </div>
            <button id="create-new-day" class="primary-btn">OK</button>
            <ol id="modal-detailes"></ol>
        </form>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/DBconnect.js"></script>
<script src="destination.js"></script>

</body>
</html>
